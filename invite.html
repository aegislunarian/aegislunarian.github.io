<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Acceptation • The Continuum</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="/favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="bg"></canvas>

<div class="overlay"></div>

<main class="success">

    <div class="card">

        <div class="check">
            ✦
        </div>

        <span class="badge">
            INVITATION PRIVÉE
        </span>

        <h1>Invitation.</h1>

        <h2 id="player-pseudo">~ Bienvenue ~</h2>

        <div class="divider">

            <span></span>

            <div class="diamond"></div>

            <span></span>

        </div>

        <p>
            Vous outrepassez les candidatures à <strong>The Continuum SMP</strong>.
        </p>

        <p class="small">
            Nous sommes impatients de vous accueillir dans cette nouvelle aventure.
            Préparez-vous à entrer dans le Continuum.
        </p>

        <button onclick="openForm()">
            REJOINDRE (Formulaire & Modpack)
        </button>

    </div>

</main>

<footer class="credits">

    Propulsé par <span>Café Showdown!</span>

</footer>

<script src="script.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pseudo = urlParams.get('id');

    if (pseudo) {
        const pseudoElement = document.getElementById("player-pseudo");
        if (pseudoElement) {
            pseudoElement.textContent = `~ ${pseudo} ~`;
        }
    }
</script>

<script>
function openForm() {
    window.open("https://forms.gle/mewAEag5wu8R9Enk9", "_blank");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 300);
}
</script>

</body>

</html>
